name: build-app

on:
  push:
    tags:
      - "v*"
    branches:
      - "release/**"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            exe_name: xzqh-gui.exe
            artifact_name: xzqh-gui-windows.exe
          - os: macos-latest
            platform: macos
            exe_name: xzqh-gui.app
            artifact_name: xzqh-gui-macos.app
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # action-gh-release 需要写 Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Regenerate icons (PNG + ICO)
        run: python tools/make_icons.py

      - name: Generate .icns (macOS only)
        if: matrix.platform == 'macos'
        run: |
          set -e
          cd assets
          mkdir -p icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          cp icon.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset
          ls -la icon.icns

      - name: Build (PyInstaller)
        run: python -m PyInstaller packaging/xzqh-gui.spec --noconfirm

      - name: Inspect dist (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          ls -la dist/
          test -f dist/xzqh-gui.exe

      - name: Inspect dist (macOS)
        if: matrix.platform == 'macos'
        run: |
          ls -la dist/
          test -d dist/xzqh-gui.app

      - name: Package macOS .app as zip
        if: matrix.platform == 'macos'
        run: |
          cd dist
          zip -r xzqh-gui-macos.app.zip xzqh-gui.app
          ls -la xzqh-gui-macos.app.zip

      - name: Rename Windows exe
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cp dist/xzqh-gui.exe dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}
            dist/xzqh-gui-macos.app.zip
          if-no-files-found: ignore
          retention-days: 30

      - name: Attach to GitHub Release (Windows)
        if: matrix.platform == 'windows' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
          fail_on_unmatched_files: true
          draft: false
          generate_release_notes: true

      - name: Attach to GitHub Release (macOS)
        if: matrix.platform == 'macos' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/xzqh-gui-macos.app.zip
          fail_on_unmatched_files: true
          draft: false
          generate_release_notes: true

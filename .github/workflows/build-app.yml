name: build-app

on:
  push:
    tags:
      - "v*"
    branches:
      - "release/**"
  workflow_dispatch: {}

jobs:
  windows-build:
    runs-on: windows-latest
    permissions:
      contents: write   # action-gh-release 需要写 Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Build (PyInstaller)
        run: python -m PyInstaller packaging/xzqh-gui.spec --noconfirm

      - name: Smoke check exe exists
        shell: bash
        run: |
          test -f dist/xzqh-gui/xzqh-gui.exe || (echo "exe missing" && exit 1)
          ls -la dist/xzqh-gui/

      - name: Upload onedir artifact
        uses: actions/upload-artifact@v4
        with:
          name: xzqh-gui-windows-onedir
          path: dist/xzqh-gui/
          if-no-files-found: error
          retention-days: 30

      - name: Zip onedir for release attachment
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path dist/xzqh-gui/* -DestinationPath xzqh-gui-${{ github.ref_name }}-windows.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: xzqh-gui-${{ github.ref_name }}-windows.zip
          fail_on_unmatched_files: true
          draft: false
          generate_release_notes: true
